<div class="container py-5">
  <div class="card shadow-lg border-0 rounded-4">
    <div class="card-header bg-primary text-white rounded-top-4">
      <h4 class="mb-0 text-center">Employee Management</h4>
    </div>

    <div class="card-body">

      <!-- Loading Spinner -->
      <div *ngIf="isLoading" class="text-center my-5">
        <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;"></div>
        <p class="mt-3 text-muted">Loading employees...</p>
      </div>

      <!-- Error Message -->
      <div *ngIf="errorMessage" class="alert alert-danger text-center">
        {{ errorMessage }}
      </div>

      <!-- No Data -->
      <div *ngIf="!isLoading && employees.length === 0" class="alert alert-info text-center">
        No employees found.
      </div>

      <!-- Employee Table -->
      <div class="table-responsive" *ngIf="!isLoading && employees.length > 0">
        <table class="table table-hover align-middle">
          <thead class="table-dark text-center">
            <tr>
              <th>#</th>
              <th>Name</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Status</th>
            </tr>
          </thead>

          <tbody>
            <tr *ngFor="let emp of employees; let i = index">
              <td class="text-center">{{ i + 1 }}</td>
              <td>
                <strong>{{ emp.firstName }} {{ emp.surname }}</strong>
              </td>
              <td>{{ emp.email }}</td>
              <td>{{ emp.phone }}</td>
              <td class="text-center">
              <!--  <span class="badge px-3 py-2"
                [ngClass]="emp.empStatus ? 'bg-success' : 'bg-danger'">
                  {{ emp.empStatus ? 'Active' : 'Inactive' }}
                </span>-->
              </td>
            </tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>
</div>
