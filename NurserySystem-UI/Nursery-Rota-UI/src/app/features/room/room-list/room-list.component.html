
<div class="page-container">

    <div class="page-header">
        <div class="page-title">
            <mat-icon>place</mat-icon>
            <span>Rooms</span>
        </div>
        <div class="header-actions">
            <div class="search-box">
                <mat-icon>search</mat-icon>
                <input placeholder="Search Room..." (keyup)="applyFilter($event)">
            </div>
            <button mat-raised-button color="primary" (click)="openAddRoom()">
                <mat-icon>add</mat-icon>
                Add Room
            </button>
        </div>
    </div>
    <div class="table-wrapper">
        <table mat-table [dataSource]="dataSource" matSort>
            <ng-container matColumnDef="id">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>ID</th>
                <td mat-cell *matCellDef="let r">{{r.id}}</td>
            </ng-container>
            <ng-container matColumnDef="roomCode">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Room</th>
                <td mat-cell *matCellDef="let r">{{r.roomCode}}</td>
            </ng-container>
            <ng-container matColumnDef="isActive">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Status</th>
                <td mat-cell *matCellDef="let r">
                    <span [ngClass]="r.isActive? 'status-active':'status-inactive'">
                        {{r.isActive? 'Active':'Inactive'}}
                    </span>
                </td>
            </ng-container>
            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef>Actions</th>
                <td mat-cell *matCellDef="let element">
                    <button mat-icon-button color="primary" (click)="editRoom(element)" matTooltip="Edit Room">
                        <mat-icon>edit</mat-icon>
                    </button>
                </td>
            </ng-container>
            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
<tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
        <mat-paginator [pageSize]="5" [pageSizeOptions]="[5,10,20]" showFirstLastButtons>
        </mat-paginator>
    </div>

</div>
