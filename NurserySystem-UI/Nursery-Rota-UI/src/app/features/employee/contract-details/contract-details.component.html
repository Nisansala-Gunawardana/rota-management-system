<div class="page-container">
    <div class="page-header">
        <div class="page-title">
            <mat-icon>assignment</mat-icon>
            <span>Employee Contracts</span>
        </div>
        <div class="header-actions">
            <div class="search-box">
                <mat-icon>search</mat-icon>
                <input placeholder="Search Contracts..." (keyup)="applyFilter($event)">
            </div>
            <button mat-raised-button color="primary" (click)="openAddContract()">
                <mat-icon>add</mat-icon>
                Add Contract
            </button>
        </div>
    </div>
    <div class="table-wrapper">
        <table mat-table [dataSource]="dataSource" matSort>
            <!--Id-->
            <ng-container matColumnDef="id">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>ID</th>
                <td mat-cell *matCellDef="let con">{{con.id}}</td>
            </ng-container>

            <!--Employee Id-->
            <ng-container matColumnDef="empId">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Employee ID</th>
                <td  mat-cell *matCellDef="let con">{{con.empId}}</td>
            </ng-container>

             <!--Employee Name-->
            <ng-container matColumnDef="employeName">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
                <td  mat-cell *matCellDef="let con">{{con.employeName}}</td>
            </ng-container>

            <!--contract type-->
            <ng-container matColumnDef="contractType">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Contract Type</th>
                <td mat-cell *matCellDef="let con">{{con.contractType}}</td>
            </ng-container>

            <!--Hours-->
            <ng-container matColumnDef="contractHours">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Hours</th>
                <td mat-cell *matCellDef="let con">{{con.contractHours}}</td>
            </ng-container>

            <!--start date-->
         <!--   <ng-container matColumnDef="startdate">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Start Date</th>
                <td mat-cell *matCellDef="let con">{{con.cstartDate}}</td>
            </ng-container>-->

            <!--end date-->
          <!--  <ng-container matColumnDef="enddate">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>End Date</th>
                <td mat-cell *matCellDef="let con">{{con.cendDate}}</td>
            </ng-container>-->

            <!--hourly rate-->
          <!--  <ng-container matColumnDef="hourlyrate">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Hourlyrate</th>
                <td mat-cell *matCellDef="let con">{{con.hourlyrate}}</td>
            </ng-container>-->

            <!--no of leaves-->
         <!--   <ng-container matColumnDef="noofleave">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>No of Leave</th>
                <td mat-cell *matCellDef="let con">{{con.noofleave}}</td>
            </ng-container>-->

            <!--status-->
            <ng-container matColumnDef="cStatus">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Status</th>
                <td mat-cell *matCellDef="let con">{{con.cStatus}}</td>
            </ng-container>

            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef>Actions</th>
                <td mat-cell *matCellDef="let element">
                    <button mat-icon-button
                            color="primary"
                            (click)="editContract(element)"
                            matTooltip="Edit Contract">
                            <mat-icon>edit</mat-icon>
                        </button>
                </td>
            </ng-container>
             <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
             <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>

        <mat-paginator
            [pageSize]="5"
            [pageSizeOptions]="[5,10,20]"
            showFirstLastButtons>
        </mat-paginator>
    </div>
</div>
