<h2 mat-dialog-title>{{data?'Edit Employee':'Add Employee'}}</h2>

<!--<form #employeeForm="ngForm"> -->
  <form [formGroup]="employeeForm">
   <div mat-dialog-content>
   
    <div *ngIf="isEditMode">
      <p><strong>Employee ID:</strong>{{f['id'].value}}</p>
    </div>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>First Name</mat-label>
   <!-- <input matInput name="firstName" [(ngModel)]="employee.firstName" required #firstName="ngModel">-->
    <input matInput formControlName="firstName">
   <!-- <mat-error *ngIf="firstName.invalid && firstName.touched">First name is required</mat-error>-->
    <mat-error *ngIf="f['firstName'].touched && f['firstName'].invalid"> First name is required </mat-error>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Surname</mat-label>
  <!--  <input matInput name="surname" [(ngModel)]="employee.surname" required #surname="ngModel">-->
    <input matInput formControlName="surname">

 <mat-error *ngIf="f['surname'].invalid && f['surname'].touched">Surname is required</mat-error>
  </mat-form-field>

   <mat-form-field appearance="outline" class="full-width">
    <mat-label>Address</mat-label>
  <!--x <input matInput [(ngModel)]="employee.address">-->
  <input matInput formControlName="address">
  </mat-form-field>

   <mat-form-field appearance="outline" class="full-width">
  <mat-label>Date of Birth</mat-label>
  <input matInput
         [matDatepicker]="picker"
         [max]="maxDate"
         formControlName="dob">
         
  <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
  <mat-datepicker #picker></mat-datepicker>
  <mat-error *ngIf="f['dob'].invalid && f['dob'].touched">Date of Birth is required</mat-error>
</mat-form-field>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Email</mat-label>
    <input matInput type="email" formControlName="email">
    <mat-error *ngIf="f['email'].errors?.['required']">Email is required</mat-error>
    <mat-error *ngIf="f['email'].errors?.['email']">Invalid email format</mat-error>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Phone</mat-label>
    <input matInput formControlName="phone">
    <mat-error *ngIf="f['phone'].errors?.['required']"> phone is required</mat-error>
    <mat-error *ngIf="f['phone'].errors?.['minlength']">phone must be least 10 digits</mat-error>
  </mat-form-field>

  <mat-slide-toggle formControlName="empStatus"> Active Employee</mat-slide-toggle>

</div>

<div mat-dialog-actions align="end">
  <button mat-button  type="button" (click)="cancel()">Cancel</button>
  <button mat-raised-button color="primary" type="button" (click)="save()" [disabled]="employeeForm.invalid">{{isEditMode?'Update':'Save'}}</button>
</div>
</form>
