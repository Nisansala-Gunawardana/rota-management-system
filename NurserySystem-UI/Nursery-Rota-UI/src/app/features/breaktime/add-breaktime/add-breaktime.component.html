<h2 mat-dialog-title>{{data?'Edit BreakTime':'Add BreakTime'}}</h2>

<form [formGroup]="breaktimeForm">
    <div mat-dialog-content>

        <div *ngIf="isEditMode">
            <p><strong>BrakTime ID:</strong>{{f['id'].value}}</p>
        </div>
        <mat-form-field appearance="outline" class="full-width">
            <mat-label>Duration Minutes</mat-label>
            <input matInput formControlName="durationMinutes">
            <mat-error *ngIf="f['durationMinutes'].touched && f['durationMinutes'].invalid">Duration is required </mat-error>
        </mat-form-field>
        <mat-slide-toggle formControlName="isActive">Active BreakTime</mat-slide-toggle>
    </div>

    <div mat-dialog-actions align="end">
        <button mat-button type="button" (click)="cancel()">Cancel</button>
        <button mat-raised-button color="primary" type="button" (click)="save()"
            [disabled]="breaktimeForm.invalid">{{isEditMode?'Update':'Save'}}</button>
    </div>

</form>
