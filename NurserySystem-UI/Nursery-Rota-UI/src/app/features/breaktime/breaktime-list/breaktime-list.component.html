<div class="page-container">
    <div class="page-header">
        <div class="page-title">
            <mat-icon>free_breakfast</mat-icon>
            <span>Break Time</span>
        </div>
        <div class="header-actions">
            <div class="search-box">
                <mat-icon>search</mat-icon>
                <input placeholder="Search Break Times..." (keyup)="applyFilter($event)">
            </div>
            <button mat-raised-button color="primary" (click)="openAddBreak()">
                <mat-icon>add</mat-icon>
                Add BreakTime
            </button>
        </div>
    </div>
    <div class="table-wrapper">
        <table mat-table [dataSource]="dataSource" matSort>
            <ng-container matColumnDef="id">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>ID</th>
                <td mat-cell *matCellDef="let s">{{s.id}}</td>
            </ng-container>
            <ng-container matColumnDef="durationMinutes">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Time Duration(Minutes)</th>
                <td mat-cell *matCellDef="let s">{{s.durationMinutes}}</td>
            </ng-container>
            <ng-container matColumnDef="isActive">
                <th mat-header-cell *matHeaderCellDef>Status</th>
                <td mat-cell *matCellDef="let s">
                    <span [ngClass]="s.isActive?'status-active':'status-inactive'">
                        {{s.isActive?'Active':'Inactive'}}
                    </span>
                </td>
            </ng-container>
            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef>Actions</th>
                <td mat-cell *matCellDef="let element">
                    <button mat-icon-button color="primary" (click)="editBreak(element)" matTooltip="Edit Break">
                        <mat-icon>edit</mat-icon>
                    </button>
                </td>

            </ng-container>
            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

        </table>
        <mat-paginator [pageSize]="5" [pageSizeOptions]="[5,10,20]" showFirstLastButtons>
        </mat-paginator>
    </div>
</div>
