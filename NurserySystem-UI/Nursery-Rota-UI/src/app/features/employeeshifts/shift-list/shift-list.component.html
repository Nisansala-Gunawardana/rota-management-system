
<div class="page-container">

  <div class="page-header">
    <div class="page-title">
      <mat-icon>work</mat-icon>
      <span>Employee Shifts</span>
    </div>
    <div class="header-actions">
  
      <div class="search-box">
        <mat-icon>search</mat-icon>
        <input placeholder="Search employees..." (keyup)="applyFilter($event)">
      </div>
      <button mat-raised-button color="primary" (click)="openAddEmployeeShift()">
        <mat-icon>add</mat-icon>
        Add Employee Shift
      </button>
    </div>
  </div>

  <div class="table-wrapper">
    <table mat-table [dataSource]="dataSource" matSort>

      <!-- ID -->
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>ID</th>
        <td mat-cell *matCellDef="let s">{{ s.id }}</td>
      </ng-container>

       <ng-container matColumnDef="empId">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Employee ID</th>
        <td mat-cell *matCellDef="let s">{{ s.empId }}</td>
      </ng-container>

      <!-- Name -->
      <ng-container matColumnDef="employeeName">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
        <td mat-cell *matCellDef="let s">
          {{ s.employeeName }}
        </td>
      </ng-container>

      <!-- Email -->
      <ng-container matColumnDef="workingDay">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>working Day</th>
        <td mat-cell *matCellDef="let s">{{ s.workingDay }}</td>
      </ng-container>

      <!-- Phone -->
      <ng-container matColumnDef="workShift">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Work Shift</th>
        <td mat-cell *matCellDef="let s">{{ s.workShift }}</td>
      </ng-container>

      <!-- Status -->
      <ng-container matColumnDef="shiftStatus">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Status</th>
        <td mat-cell *matCellDef="let s">
          <span [ngClass]="s.shiftStatus ? 'status-active' : 'status-inactive'">
            {{ s.shiftStatus ? 'Active' : 'Inactive' }}
          </span>
        </td>
      </ng-container>
     <ng-container matColumnDef="actions">
  <th mat-header-cell *matHeaderCellDef> Actions </th>

  <td mat-cell *matCellDef="let element">
    <button mat-icon-button
            color="primary"
            (click)="editEmployeeShift(element)"
            matTooltip="Edit Employee Shift">

      <mat-icon>edit</mat-icon>
    </button>
  </td>
</ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    </table>
    <!-- PAGINATOR -->
  <mat-paginator
      [pageSize]="5"
      [pageSizeOptions]="[5, 10, 20]"
      showFirstLastButtons>
  </mat-paginator>
  </div>

</div>
